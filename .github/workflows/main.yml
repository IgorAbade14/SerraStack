name: SerraStack CI 🚀

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Verify Docker Compose Syntax (Lint)
        run: docker compose config --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Spin up Stack (Docker Compose)
        run: |
          docker compose up -d --build
          echo "Aguardando serviços iniciarem..."
          sleep 15

      - name: Testar Funcionamento (Healthcheck)
        run: |
          # Espera um pouco mais para o PHP e o Nginx estabilizarem
          sleep 20
          
          # 1. Testa se o serviço 'web' está entregando a página
          if curl -s localhost:8082 | grep -qi "SerraStack"; then
            echo "✅ Nginx e PHP estão conversando!"
          else
            echo "❌ Erro: O site não respondeu como esperado."
            echo "--- LOGS DO SERVIDOR WEB ---"
            docker compose logs web
            echo "--- LOGS DO PHP ---"
            docker compose logs php
            exit 1
          fi

          # 2. Verifica se o Banco de Dados (db) subiu sem crashar
          if [ $(docker ps -q -f name=db) ]; then
            echo "✅ Container de Banco de Dados (db) OK!"
          else
            echo "❌ Erro: O container 'db' caiu."
            docker compose logs db
            exit 1
          fi

      - name: Cleanup
        if: always()
        run: docker compose down -v