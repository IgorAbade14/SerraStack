name: SerraStack CI 🚀

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Verify Docker Compose Syntax (Lint)
        run: docker compose config --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Spin up Stack (Docker Compose)
        run: |
          docker compose up -d --build
          echo "Aguardando serviços iniciarem..."
          sleep 15

      - name: Test Infrastructure (Full Stack Test)
        run: |
          # Valida se o site responde 'SerraStack'
          if curl -s --retry 3 --retry-delay 5 localhost:8082 | grep -qi "SerraStack"; then
            echo "✅ Frontend/PHP Healthcheck Passed!"
          else
            echo "❌ Frontend/PHP Healthcheck Failed!"
            docker compose logs app
            exit 1
          fi

          # Valida se o container do banco está ativo
          if [ $(docker ps -q -f name=db) ]; then
            echo "✅ MySQL Container is Running!"
          else
            echo "❌ MySQL Container is Down!"
            docker compose logs db
            exit 1
          fi

      - name: Cleanup
        if: always()
        run: docker compose down -v