services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: "07ghosth"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - stack-network

  php:
    build: .
    volumes:
      - ./app:/var/www/html
    networks:
      - stack-network

  web:
    image: nginx:alpine
    ports:
      - "8082:80"
    volumes:
      - ./app:/var/www/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - stack-network
    depends_on:
      - php
      - db

networks:
  stack-network:
    driver: bridge

volumes:
  db_data: