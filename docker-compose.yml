services:
  db:
    image: mysql:8.0
    container_name: db
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=12345678 # Alinhado com seu PHP
      - MYSQL_DATABASE=serrastack
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - stack-network # Nome unificado

  php:
    build: . # Ele vai ler o Dockerfile que você acabou de criar
    container_name: php
    restart: always
    volumes:
      - ./app:/var/www/html
    networks:
      - stack-network

  web:
    image: nginx:alpine
    container_name: web
    ports:
      - "8082:80"
    volumes:
      - ./app:/var/www/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - stack-network # Nome unificado
    depends_on:
      - php
      - db

networks:
  stack-network: # O nome que vale para todos
    driver: bridge

volumes:
  db_data: